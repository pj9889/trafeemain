<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="icon" type="image/webp" href="locantof1.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }
        
        /* মূল কন্টেন্ট যা ঝাপসা হবে */
        .main-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: filter 0.4s ease;
        }
        
        /* ৮০% ব্লার বা ঝাপসা করার ক্লাস */
        .blur-active {
            filter: blur(8px) brightness(0.5);
            pointer-events: none;
        }

        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .bg-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .bg-slide.active {
            opacity: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2;
        }
        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .logo-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            padding: 0 20px;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        
        .powered-by {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        .locanto-text {
            font-weight: 800;
            font-style: italic;
        }
        .lo-dark-blue { color: #1d4fa4; }
        .can-vibrant-orange { color: #f26522; }
        .to-reddish-orange { color: #c64416; }

        .text-line {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            margin: 8px 0;
            opacity: 0;
        }
        .text-many-holes {
            font-size: clamp(3.5rem, 8vw, 6rem);
            color: #fff;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055;
        }
        .slide-from-left {
            animation: slideLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .text-waiting {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }
        .slide-from-right {
            animation: slideRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .text-free {
            font-size: clamp(4rem, 10vw, 8rem);
            color: #39ff14;
            text-shadow: 0 0 15px #39ff14, 0 0 30px #39ff14, 0 0 60px #39ff14;
            margin-bottom: 15px;
        }
        .slide-from-bottom {
            animation: slideBottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       megaShake 0.15s infinite alternate linear;
            animation-delay: 0s, 0.4s;
        }

        .cta-button {
            display: none;
            text-decoration: none;
            padding: 15px 40px;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: #000;
            background: linear-gradient(90deg, #ffea00 0%, #ffcc00 100%);
            background-size: 200% auto;
            border-radius: 50px;
            box-shadow: 0 0 20px #ffcc00, inset 0 0 10px rgba(255,255,255,0.6);
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            z-index: 10;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        
        .button-active {
            display: inline-block;
            animation: pulseNudge 1.5s infinite ease-in-out;
        }

        /* পপআপ মডাল (মাঝ বরাবর দেখানোর জন্য) */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: none; /* শুরুতে হাইড থাকবে */
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .popup-content {
            background: rgba(20, 20, 20, 0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: popupScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .popup-logo {
            width: 160px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        .popup-text {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* একদম রিয়ালস্টিক ফেক বাফার */
        .real-buffer {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #39ff14; /* আকর্ষণীয় গ্রিন লোডার */
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.8s linear infinite;
            filter: drop-shadow(0 0 8px #39ff14);
        }

        @keyframes popupScale {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideLeft {
            0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; }
        }
        @keyframes slideRight {
            0% { transform: translateX(150%) skewX(20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; }
        }
        @keyframes slideBottom {
            0% { transform: translateY(150%) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes megaShake {
            0% { transform: translate(2px, 1px) rotate(0deg) scale(1); }
            20% { transform: translate(-1px, -2px) rotate(-1deg) scale(1.05); }
            40% { transform: translate(-3px, 0px) rotate(1deg) scale(1); }
            60% { transform: translate(0px, 2px) rotate(0deg) scale(1.05); }
            80% { transform: translate(1px, -1px) rotate(-1deg) scale(1); }
            100% { transform: translate(-1px, 2px) rotate(1deg) scale(1.08); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulseNudge {
            0% { transform: scale(1) rotate(0deg); box-shadow: 0 0 20px #ffcc00; }
            25% { transform: scale(1.05) rotate(-1deg); }
            50% { transform: scale(1) rotate(1deg); box-shadow: 0 0 35px #ffea00; }
            75% { transform: scale(1.05) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); box-shadow: 0 0 20px #ffcc00; }
        }
        
        /* ব্যাকগ্রাউন্ড লিংক প্রি-লোডার হাইড করার জন্য */
        #preloader {
            display: none;
        }
    </style>
</head>
<body>

    <!-- মূল কন্টেন্ট রেপার (যা পরে ব্লার হবে) -->
    <div id="mainWrapper" class="main-wrapper">
        <div class="bg-slider">
            <div class="bg-slide active" style="background-image: url('ki1.webp');"></div>
            <div class="bg-slide" style="background-image: url('ki2.webp');"></div>
            <div class="bg-slide" style="background-image: url('ki3.webp');"></div>
            <div class="bg-slide" style="background-image: url('ki4.webp');"></div>
            <div class="bg-slide" style="background-image: url('ki5.webp');"></div>
        </div>

        <div class="overlay"></div>

        <div class="content-container">
            <div class="logo-container">
                <img src="lgd1.webp" alt="Logo">
                <div class="powered-by">
                    Powered by 
                    <span class="locanto-text">
                        <span class="lo-dark-blue">L</span><span class="lo-dark-blue">o</span><span class="can-vibrant-orange">c</span><span class="can-vibrant-orange">a</span><span class="can-vibrant-orange">n</span><span class="to-reddish-orange">t</span><span class="to-reddish-orange">o</span>
                    </span>
                </div>
            </div>

            <h1 id="text1" class="text-line text-many-holes">Many Holes</h1>
            <h2 id="text2" class="text-line text-waiting">Waiting For You</h2>
            <div id="text3" class="text-line text-free">Free</div>
            
            <!-- বাটন টেক্সট (Get Hole) -->
            <button id="ctaBtn" class="cta-button">Get Hole</button>
        </div>
    </div>

    <!-- মাঝ বরাবর পপআপ কন্টেইনার (লোগো, টেক্সট ও রিয়েল বাফার) -->
    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-content">
            <!-- আপনার রিকোয়েস্ট করা লোগো নাম sxt1.webp -->
            <img src="sxt1.webp" alt="Logo" class="popup-logo">
            <!-- শুদ্ধ ইংরেজি বাক্য -->
            <div class="popup-text">Unlock Free Access to All Holes by Submitting Your Email</div>
            <!-- রিয়েলস্টিক ফেক বাফার -->
            <div class="real-buffer"></div>
        </div>
    </div>

    <!-- ২ সেকেন্ডের মধ্যে লিংক রেডি রাখার সিক্রেট আইফ্রেম ট্রিক -->
    <iframe id="preloader" src=""></iframe>

    <script>
        const affiliateLink = "https://dghhgdb.aipostsm.com/c/cea77de719368?sub1=Locantoffer";

        // স্লাইডার স্ক্রিপ্ট
        const slides = document.querySelectorAll('.bg-slide');
        let currentSlide = 0;

        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 1000);

        window.addEventListener('load', () => {
            const t1 = document.getElementById('text1');
            const t2 = document.getElementById('text2');
            const t3 = document.getElementById('text3');
            const btn = document.getElementById('ctaBtn');
            const mainWrapper = document.getElementById('mainWrapper');
            const popupOverlay = document.getElementById('popupOverlay');
            const preloader = document.getElementById('preloader');

            t1.classList.add('slide-from-left');

            setTimeout(() => {
                t2.classList.add('slide-from-right');
            }, 300);

            setTimeout(() => {
                t3.classList.add('slide-from-bottom');
                btn.classList.add('button-active');
            }, 600);

            // বাটনে ক্লিক করার পর অ্যাকশন
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                
                // ১. ব্যাকগ্রাউন্ডে এফিলিয়েট লিংকটি আগে থেকেই লোড করা শুরু করবে (২ সেকেন্ড ট্রিক)
                preloader.src = affiliateLink;

                // ২. ডিসপ্লে ৮০% ঝাপসা বা ব্লার করে দেওয়া
                mainWrapper.classList.add('blur-active');

                // ৩. মাঝখানের পপআপ, সঠিক বাক্য ও বাফারটি শো করা
                popupOverlay.style.display = 'flex';

                // ৪. ঠিক ২ সেকেন্ড (২০০০ মিলিমেকেন্ড) পর স্মুথলি রিডাইরেক্ট হবে
                setTimeout(() => {
                    window.location.replace(affiliateLink);
                }, 2000); 
            });
        });
    </script>
</body>
</html>
